name: Format Check (PR)

on:
  pull_request:
    branches: [ main, master ]

jobs:
  format-check:
    runs-on: ubuntu-latest
    env:
      EnableWindowsTargeting: "true"
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install dotnet-format
      run: dotnet tool install -g dotnet-format

    - name: Check formatting
      run: |
        dotnet format AutoBIMFusion.slnx --verify-no-changes --verbosity diagnostic || \
        dotnet format src/AutoBIMFusion.Plugin/AutoBIMFusion.Plugin.csproj --verify-no-changes --verbosity diagnostic
