name: Format Code

on:
  push:
    branches: [ main, master ]

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install dotnet-format
      run: dotnet tool install -g dotnet-format

    - name: Fix Code Style
      env:
        EnableWindowsTargeting: 'true'
        AutoCADUserPluginsDir: "./TestDeploy"
      run: |
        export EnableWindowsTargeting=true
        dotnet format AutoBIMFusion.slnx --verbosity diagnostic || \
        dotnet format src/AutoBIMFusion.Plugin/AutoBIMFusion.Plugin.csproj --verbosity diagnostic

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-format code [skip ci]"
        branch: ${{ github.head_ref }}
